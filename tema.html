<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: transparent; /* Fondo transparente para el stream */
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Tipografía tipo hacker/retro */
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ffffff; /* BLANCO PURO para máximo contraste */
            text-shadow: 4px 4px 5px #000000; /* SOMBRA NEGRA FUERTE para resaltar */
        }

        .header {
            font-size: 32px; /* Título más grande */
            margin-bottom: 10px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .command-box {
            background: rgba(0, 0, 0, 0.8); /* Fondo negro más oscuro detrás del comando */
            border-left: 5px solid #ffffff; /* Borde blanco brillante */
            padding: 15px 25px;
            border-radius: 5px;
        }

        .command {
            font-size: 40px; /* Comando mucho más grande */
            color: #ffffff;
            font-weight: bold;
        }

        .sub-text {
            font-size: 18px; /* Ejemplo más grande */
            margin-top: 10px;
            color: #cccccc; /* Gris claro para el ejemplo */
            font-style: italic;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">PIDE TU MÚSICA:</div>
        <div class="command-box">
            <div class="command">!play [Canción] [Artista]</div>
        </div>
        <div class="sub-text">Ejemplo: !play Creep Radiohead</div>
    </div>
</body>
</html>
