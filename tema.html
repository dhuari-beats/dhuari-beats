<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: transparent; /* Fondo transparente para el stream */
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #d1d1d1; /* Gris claro melancólico */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .header {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: pulse 3s infinite ease-in-out;
        }

        .command-box {
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid #55acee; /* Azul tenue */
            padding: 15px 25px;
            border-radius: 5px;
        }

        .command {
            font-size: 32px;
            color: #ffffff;
            font-weight: bold;
        }

        .sub-text {
            font-size: 14px;
            margin-top: 10px;
            color: #888;
            font-style: italic;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(0.98); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🎵 Pide el beat que mueve tu corazón:</div>
        <div class="command-box">
            <div class="command">!play [Canción] [Artista]</div>
        </div>
        <div class="sub-text">Ejemplo: !play Creep Radiohead</div>
    </div>
</body>
</html>
